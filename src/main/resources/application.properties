spring.application.name=bank
spring.mvc.servlet.path=/api/v1

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bankdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:bank}
spring.datasource.password=${DB_PASSWORD:bank}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Notification
notification.url=https://util.devi.tools/api/v1/notify

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

rabbitmq.exchange=bank.notifications
rabbitmq.queue=bank.notification.queue
rabbitmq.routing-key=notification
rabbitmq.dlx=bank.notifications.dlx
rabbitmq.dlq=bank.notification.dlq

spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
